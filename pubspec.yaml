name: kashsense
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.70.2
  file_picker: ^10.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JETBRAINSMONO-REGULAR.TTF
        - asset: assets/fonts/JETBRAINSMONO-ITALIC.TTF
          style: italic
        - asset: assets/fonts/JETBRAINSMONO-MEDIUM.TTF
          weight: 500
        - asset: assets/fonts/JETBRAINSMONO-MEDIUM-ITALIC.TTF
          weight: 500
          style: italic
        - asset: assets/fonts/JETBRAINSMONO-BOLD.TTF
          weight: 700
        - asset: assets/fonts/JETBRAINSMONO-BOLD-ITALIC.TTF
          weight: 700
          style: italic
        - asset: assets/fonts/JETBRAINSMONO-EXTRABOLD.TTF
          weight: 800
        - asset: assets/fonts/JETBRAINSMONO-EXTRABOLD-ITALIC.TTF
          weight: 800
          style: italic
